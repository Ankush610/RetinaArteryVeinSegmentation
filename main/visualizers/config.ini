# Configuration File for Retinal Vessel Analyzer
# Copy this file and modify as needed

[Model]
# Path to your trained U-Net checkpoint
checkpoint_path = ./models/checkpoint.pth

# Input image size (width, height)
image_width = 512
image_height = 512

# Device to use (cuda, cpu, or auto)
device = auto

[Segmentation]
# Color mapping for vessel types (BGR format)
# These should match your model's output classes
background_color = 0,0,0
artery_color = 255,0,0      # Red
vein_color = 0,0,255        # Blue
junction_color = 0,255,0    # Green

# Number of output classes
num_classes = 5

[Analysis]
# Minimum vessel segment length (in pixels)
min_segment_length = 5

# Junction detection sensitivity (number of neighbors)
junction_threshold = 2

# Endpoint detection (number of neighbors)
endpoint_threshold = 1

# Bifurcation angle calculation (number of points to use)
bifurcation_points = 5

[Visualization]
# Figure size for analysis plots (width, height in inches)
figure_width = 15
figure_height = 10

# DPI for saved images
dpi = 100

# Color map for segment visualization
segment_colormap = rainbow

[Output]
# JSON indentation
json_indent = 2

# Save intermediate results
save_skeleton = false
save_distance_map = false
save_segments = true

[Interface]
# Gradio server settings
server_name = 0.0.0.0
server_port = 7860
share = false

# Enable queue for multiple users
enable_queue = true

# Maximum file upload size (MB)
max_file_size = 10
